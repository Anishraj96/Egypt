<!DOCTYPE html>
<html>
<head>
<title>Dream11 GL AI PRO - Ultimate</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{background:#020617;color:#fff;font-family:Arial;padding:10px;}
.container{max-width:1000px;margin:auto;}
h2{text-align:center;color:#22c55e;}

.card{
background:#1e293b;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

textarea{
width:100%;height:100px;
background:#020617;color:white;
border:none;border-radius:8px;padding:8px;
}

input,button{
width:100%;padding:10px;margin-top:5px;
border-radius:8px;border:none;background:#020617;color:white;
}

button{background:#22c55e;font-weight:bold;}

#out{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
max-height:70vh;
overflow-y:auto;
}

.team{
background:#020617;
padding:8px;
border-radius:8px;
font-size:12px;
border:1px solid #1e293b;
}

.c{color:gold;}
.vc{color:#38bdf8;}
</style>
</head>

<body>

<div class="container">

<h2>🏏 Dream11 GL AI PRO (Ultimate)</h2>

<div class="card">
<b>TEAM A (use tags: wk/bat/ar/bowl)</b>
<textarea id="teamA"></textarea>
</div>

<div class="card">
<b>TEAM B (use tags: wk/bat/ar/bowl)</b>
<textarea id="teamB"></textarea>
</div>

<div class="card">
<label>No. Teams</label>
<input type="number" id="teams" value="10">
</div>

<button onclick="generate()">🚀 Generate Teams</button>

<div id="out"></div>

</div>

<script>

// 🔹 ROLE DETECTION
function getRole(name){
let n=name.toLowerCase();

if(n.includes("(wk)")) return "WK";
if(n.includes("(bat)")) return "BAT";
if(n.includes("(ar)")) return "AR";
if(n.includes("(bowl)")) return "BOWL";

if(n.includes("keeper")) return "WK";
if(n.includes("allround")) return "AR";
if(n.includes("bowler")) return "BOWL";

return "BAT";
}

// 🔹 PLAYER WEIGHT
function getWeight(name){
let n=name.toLowerCase();

// ⭐ stars
if(n.includes("kohli") || n.includes("rohit") || n.includes("buttler") || n.includes("rashid"))
return 5;

// 🔥 strong
if(n.includes("gill") || n.includes("rahul") || n.includes("iyer"))
return 4;

// 🎯 diff
return 2;
}

// PARSE
function parse(text,team){
return text.split(",")
.map(x=>x.trim())
.filter(x=>x)
.map(x=>({
name:x,
team:team,
role:getRole(x),
weight:getWeight(x)
}));
}

// VALIDATE
function validate(team){

let A=team.filter(p=>p.team==="A").length;
let B=team.filter(p=>p.team==="B").length;

if(A>7 || B>7) return false;

let wk=team.filter(p=>p.role==="WK").length;
let bat=team.filter(p=>p.role==="BAT").length;
let ar=team.filter(p=>p.role==="AR").length;
let bowl=team.filter(p=>p.role==="BOWL").length;

if(wk<1 || bat<3 || ar<1 || bowl<3) return false;

return true;
}

// 🔥 WEIGHTED PICK
function weightedPick(players){
let total = players.reduce((s,p)=>s+p.weight,0);
let r = Math.random()*total;

for(let p of players){
if(r < p.weight) return p;
r -= p.weight;
}
return players[0];
}

// 🔥 TEAM HASH
function teamHash(team){
return team.map(p=>p.name).sort().join("-");
}

// 🔥 ROLE-BASED C/VC (FIXED)
function pickCaptainViceCaptain(team){

let roles = {
WK: team.filter(p=>p.role==="WK"),
BAT: team.filter(p=>p.role==="BAT"),
AR: team.filter(p=>p.role==="AR"),
BOWL: team.filter(p=>p.role==="BOWL")
};

let combos = [
["BAT","BOWL"],
["AR","BAT"],
["AR","BOWL"],
["WK","BAT"]
];

let combo = combos[Math.floor(Math.random()*combos.length)];

let role1 = combo[0];
let role2 = combo[1];

if(!roles[role1].length) role1 = "BAT";
if(!roles[role2].length) role2 = "AR";

// Captain
let captainPool = roles[role1];
let captain = captainPool.sort((a,b)=>b.weight-a.weight)[
Math.floor(Math.random()*Math.min(2,captainPool.length))
];

// VC
let vcPool = roles[role2].filter(p=>p.name!==captain.name);

if(vcPool.length===0){
vcPool = team.filter(p=>p.name!==captain.name);
}

let viceCaptain = vcPool.sort((a,b)=>b.weight-a.weight)[
Math.floor(Math.random()*Math.min(3,vcPool.length))
];

return {captain, viceCaptain};
}

// 🚀 GENERATE
function generate(){

let A=parse(teamA.value,"A");
let B=parse(teamB.value,"B");

if(!A.length || !B.length){
alert("Enter both teams");
return;
}

let all=[...A,...B];
let total=parseInt(teams.value);

let out="";
let usedTeams=new Set();

for(let t=1;t<=total;t++){

let attempts=0;
let success=false;

while(attempts<200){

attempts++;

let team=[];
let usedPlayers=new Set();

// BUILD
while(team.length<11){

let p = weightedPick(all);

if(!usedPlayers.has(p.name)){
usedPlayers.add(p.name);
team.push(p);
}
}

// VALIDATE
if(!validate(team)) continue;

// UNIQUE
let hash = teamHash(team);
if(usedTeams.has(hash)) continue;

usedTeams.add(hash);

// 🎯 NEW C/VC
let {captain, viceCaptain} = pickCaptainViceCaptain(team);

// OUTPUT
out+=`<div class="team"><b>Team ${t}</b>`;

team.forEach(p=>{
let tag="";
if(p.name===captain.name) tag=` <span class="c">(C)</span>`;
else if(p.name===viceCaptain.name) tag=` <span class="vc">(VC)</span>`;

out+=`<div>${p.name} [${p.team}-${p.role}] ${tag}</div>`;
});

out+=`</div>`;
success=true;
break;
}

if(!success){
out+=`<div class="team">⚠️ Team ${t} failed</div>`;
}

}

document.getElementById("out").innerHTML=out;
}

</script>

</body>
</html>
