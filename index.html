<!DOCTYPE html>
<html>
<head>
<title>Dream11 GL AI Advanced</title>

<style>
body { font-family: Arial; background:#0f172a; color:white; text-align:center; }
textarea { width:90%; height:70px; margin:5px; border-radius:8px; }
select,input { padding:8px; margin:5px; border-radius:8px; }
button { padding:10px; margin:10px; border-radius:8px; background:#22c55e; color:white; }
.team { background:#1e293b; margin:10px; padding:10px; border-radius:10px; }
.c { color:gold; font-weight:bold; }
.vc { color:#38bdf8; font-weight:bold; }
</style>

</head>

<body>

<h2>🏏 Dream11 GL AI Advanced</h2>

WK:<br><textarea id="wk"></textarea>
BAT:<br><textarea id="bat"></textarea>
AR:<br><textarea id="ar"></textarea>
BOWL:<br><textarea id="bowl"></textarea>

<br>

Pitch:
<select id="pitch">
<option value="batting">Batting</option>
<option value="bowling">Bowling</option>
<option value="spin">Spin</option>
<option value="balanced">Balanced</option>
</select>

Teams:
<input type="number" id="teams" value="5" min="1" max="20">

<br>
<button onclick="generate()">Generate GL Teams</button>

<div id="out"></div>

<script>

// 🔥 PARSE
function parseNames(text){
    return text.split(",")
        .map(n=>n.trim())
        .filter(n=>n.length>0)
        .map(n=>({
            name:n,
            sel:Math.floor(Math.random()*70)+20
        }));
}

// 🌟 CORE PLAYERS STORE
let corePool=[];

// 🎯 SAFE PICK WITH GL LOGIC
function pickPlayers(list,count){

    let sorted=[...list].sort((a,b)=>b.sel-a.sel);

    let safe = sorted.slice(0, Math.ceil(list.length*0.6));
    let diff = sorted.slice(Math.ceil(list.length*0.6));

    let result=[];

    for(let i=0;i<count;i++){

        let useSafe = Math.random()<0.7;
        let pool = useSafe ? safe : diff;

        let player = pool[Math.floor(Math.random()*pool.length)];

        // avoid duplicates
        if(result.find(p=>p.name===player.name)){
            i--;
            continue;
        }

        result.push(player);

        // mark core
        if(Math.random()<0.5){
            corePool.push(player.name);
        }
    }

    return result;
}

// 🔀 SHUFFLE
function shuffle(arr){
    return [...arr].sort(()=>Math.random()-0.5);
}

// 👑 CAPTAIN (safe + smart)
function getCaptain(team){

    let sorted=[...team].sort((a,b)=>b.sel-a.sel);
    let top=sorted.slice(0,4);

    return top[Math.floor(Math.random()*top.length)];
}

// 👑 VICE
function getVice(team,c){

    let others = team.filter(p=>p.name!==c.name);
    let sorted=[...others].sort((a,b)=>b.sel-a.sel);
    let top=sorted.slice(0,4);

    return top[Math.floor(Math.random()*top.length)];
}

// 🚀 GENERATE
function generate(){

    corePool=[];

    let WK=parseNames(document.getElementById("wk").value);
    let BAT=parseNames(document.getElementById("bat").value);
    let AR=parseNames(document.getElementById("ar").value);
    let BOWL=parseNames(document.getElementById("bowl").value);

    if(!WK.length||!BAT.length||!AR.length||!BOWL.length){
        alert("Enter all players");
        return;
    }

    let pitch=document.getElementById("pitch").value;
    let count=parseInt(document.getElementById("teams").value);

    let combo={
        batting:{wk:1,bat:5,ar:2,bowl:3},
        bowling:{wk:1,bat:3,ar:2,bowl:5},
        spin:{wk:1,bat:3,ar:3,bowl:4},
        balanced:{wk:1,bat:4,ar:3,bowl:3}
    };

    let c=combo[pitch];
    let output="";

    for(let t=1;t<=count;t++){

        let team=[];

        team.push(...pickPlayers(WK,c.wk));
        team.push(...pickPlayers(BAT,c.bat));
        team.push(...pickPlayers(AR,c.ar));
        team.push(...pickPlayers(BOWL,c.bowl));

        let all=[...WK,...BAT,...AR,...BOWL];

        // ensure 11 players
        while(team.length<11){
            let extra=all[Math.floor(Math.random()*all.length)];
            if(!team.find(p=>p.name===extra.name)){
                team.push(extra);
            }
        }

        team=shuffle(team);

        let captain=getCaptain(team);
        let vice=getVice(team,captain);

        // safety
        if(!captain) captain=team[0];
        if(!vice || vice.name===captain.name) vice=team[1];

        output+=`<div class="team"><b>Team ${t}</b><br>`;

        team.forEach(p=>{
            let tag="";
            if(p.name===captain.name) tag=` <span class="c">(C)</span>`;
            else if(p.name===vice.name) tag=` <span class="vc">(VC)</span>`;

            output+=`<div>${p.name}${tag}</div>`;
        });

        output+=`</div>`;
    }

    document.getElementById("out").innerHTML=output;
}

</script>

</body>
</html>
