<!DOCTYPE html>
<html>
<head>
<title>Dream11 AI Pro</title>

<style>
body { font-family: Arial; background:#0f172a; color:white; text-align:center; }
textarea { width:90%; height:70px; margin:5px; border-radius:8px; }
select,input { padding:8px; margin:5px; border-radius:8px; }
button { padding:10px; margin:10px; border-radius:8px; background:#22c55e; color:white; }
.team { background:#1e293b; margin:10px; padding:10px; border-radius:10px; }
.c { color:gold; font-weight:bold; }
.vc { color:#38bdf8; font-weight:bold; }
</style>

</head>

<body>

<h2>🏏 Dream11 AI PRO</h2>
<p>Enter only player names (comma separated)</p>

WK:<br>
<textarea id="wk"></textarea>

BAT:<br>
<textarea id="bat"></textarea>

AR:<br>
<textarea id="ar"></textarea>

BOWL:<br>
<textarea id="bowl"></textarea>

<br>

Pitch:
<select id="pitch">
<option value="batting">Batting</option>
<option value="bowling">Bowling</option>
<option value="balanced">Balanced</option>
<option value="spin">Spin</option>
</select>

Teams:
<input type="number" id="teams" value="5" min="1" max="20">

<br>

<button onclick="generate()">Generate Teams</button>

<div id="out"></div>

<script>

// 🔥 PARSE PLAYER NAMES
function parseNames(text){
    return text.split(",").map(n=>{
        return {
            name: n.trim(),
            sel: Math.floor(Math.random()*70)+20 // 20–90%
        };
    }).filter(p=>p.name);
}

// 🌟 GLOBAL MEMORY
let corePlayers = {};
let capHistory = [];
let vcHistory = [];

// 🎯 ROLE BASED WEIGHT
function roleWeight(role,pitch){

    if(pitch==="batting"){
        return role==="BAT"?1.5 : role==="AR"?1.3 : 1;
    }
    if(pitch==="bowling"){
        return role==="BOWL"?1.5 : role==="AR"?1.3 : 1;
    }
    if(pitch==="spin"){
        return role==="BOWL"?1.4 : role==="AR"?1.3 : 1;
    }
    return 1.2; // balanced
}

// 🎯 SMART PICK
function pickPlayers(list,count,pitch,role){

    let selected=[];
    let pool=[...list];

    while(selected.length<count && pool.length>0){

        let weights=pool.map(p=>{

            let diff = (100 - p.sel); // differential
            let coreBoost = corePlayers[p.name]?1.5:1;
            let pitchBoost = roleWeight(role,pitch);

            return diff * coreBoost * pitchBoost;
        });

        let total=weights.reduce((a,b)=>a+b,0);
        let r=Math.random()*total;

        for(let i=0;i<pool.length;i++){
            if(r<weights[i]){
                selected.push(pool[i]);

                corePlayers[pool[i].name] = (corePlayers[pool[i].name]||0)+1;

                pool.splice(i,1);
                break;
            }
            r-=weights[i];
        }
    }

    return selected;
}

// 🔀 SHUFFLE
function shuffle(arr){
    return [...arr].sort(()=>Math.random()-0.5);
}

// 👑 CAPTAIN
function getCaptain(team){

    let sorted=[...team].sort((a,b)=>b.sel-a.sel);
    let top=sorted.slice(0,4);

    if(capHistory.length>0 && Math.random()<0.6){
        return capHistory[Math.floor(Math.random()*capHistory.length)];
    }

    let c = top[Math.floor(Math.random()*top.length)];
    capHistory.push(c);
    return c;
}

// 👑 VICE
function getVice(team,c){

    let others = team.filter(p=>p.name!==c.name);
    let sorted=[...others].sort((a,b)=>b.sel-a.sel);
    let top=sorted.slice(0,4);

    if(vcHistory.length>0 && Math.random()<0.6){
        return vcHistory[Math.floor(Math.random()*vcHistory.length)];
    }

    let vc = top[Math.floor(Math.random()*top.length)];
    vcHistory.push(vc);
    return vc;
}

// 🚀 GENERATE
function generate(){

    corePlayers={};
    capHistory=[];
    vcHistory=[];

    let WK=parseNames(document.getElementById("wk").value);
    let BAT=parseNames(document.getElementById("bat").value);
    let AR=parseNames(document.getElementById("ar").value);
    let BOWL=parseNames(document.getElementById("bowl").value);

    if(!WK.length || !BAT.length || !AR.length || !BOWL.length){
        alert("Enter all player categories!");
        return;
    }

    let pitch=document.getElementById("pitch").value;
    let count=document.getElementById("teams").value;

    let combo={
        batting:{wk:1,bat:5,ar:2,bowl:3},
        bowling:{wk:1,bat:3,ar:2,bowl:5},
        balanced:{wk:1,bat:4,ar:3,bowl:3},
        spin:{wk:1,bat:3,ar:3,bowl:4}
    };

    let c=combo[pitch];
    let output="";

    for(let i=1;i<=count;i++){

        let team=[];

        team.push(...pickPlayers(WK,c.wk,pitch,"WK"));
        team.push(...pickPlayers(BAT,c.bat,pitch,"BAT"));
        team.push(...pickPlayers(AR,c.ar,pitch,"AR"));
        team.push(...pickPlayers(BOWL,c.bowl,pitch,"BOWL"));

        let all=[...WK,...BAT,...AR,...BOWL];

        while(team.length<11){
            let extra=all[Math.floor(Math.random()*all.length)];
            if(!team.find(p=>p.name===extra.name)){
                team.push(extra);
            }
        }

        team=shuffle(team);

        let captain=getCaptain(team);
        let vice=getVice(team,captain);

        output+=`<div class="team"><b>Team ${i}</b><br>`;

        team.forEach(p=>{
            let tag="";
            if(p.name===captain.name) tag=` <span class="c">(C)</span>`;
            else if(p.name===vice.name) tag=` <span class="vc">(VC)</span>`;

            output+=`<div>${p.name}${tag}</div>`;
        });

        output+=`</div>`;
    }

    document.getElementById("out").innerHTML=output;
}

</script>

</body>
</html>
