<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream11 Elite GL AI Engine</title>

<style>
body{font-family:Arial;background:#0f172a;color:#fff;padding:20px}
h1{text-align:center}
textarea,select,button{padding:12px;margin:6px 0;width:100%;border-radius:8px;border:none}
button{background:#22c55e;color:#000;font-weight:bold;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:15px;margin-top:15px}
.card{background:#1e293b;padding:12px;border-radius:12px}
.error{background:#ef4444;padding:10px;border-radius:8px;margin-top:10px}
.badge{padding:3px 6px;border-radius:6px;font-size:12px;margin-left:5px}
.safe{background:#22c55e;color:#000}
.mid{background:#facc15;color:#000}
.diff{background:#ef4444}
</style>
</head>

<body>

<h1>🔥 Dream11 Elite GL AI Engine</h1>

<textarea id="input" rows="8" placeholder="Name, Role, Team, Credit, Selection%"></textarea>

<select id="risk">
<option value="safe">Safe</option>
<option value="medium">Medium</option>
<option value="high">High Risk</option>
</select>

<button onclick="generateTeams()">Generate Elite GL Teams</button>

<div id="error"></div>
<div id="output" class="grid"></div>

<script>

let exposure = {};
let captainExposure = {};

function parsePlayers(input){
return input.split("\n").map(l=>{
let [name,role,team,credit,sel]=l.split(",");
return {name:name?.trim(),role:role?.trim(),team:team?.trim(),credit:+credit||8,sel:+sel||50};
}).filter(p=>p.name);
}

function shuffle(a){return [...a].sort(()=>0.5-Math.random())}
function getByRole(p,r){return p.filter(x=>x.role===r)}
function totalCredits(t){return t.reduce((s,p)=>s+p.credit,0)}

function showError(msg){document.getElementById("error").innerHTML=`<div class="error">${msg}</div>`}
function clearError(){document.getElementById("error").innerHTML=""}

function validate(players){
if(players.filter(p=>p.role==='WK').length<1){showError("Add WK");return false}
if(new Set(players.map(p=>p.team)).size<2){showError("Add 2 teams");return false}
clearError();return true;
}

function isValid(t){
let c={WK:0,BAT:0,AR:0,BOWL:0},tc={};
t.forEach(p=>{c[p.role]++;tc[p.team]=(tc[p.team]||0)+1});
return t.length===11 && c.WK>=1 && c.BAT>=3 && c.AR>=1 && c.BOWL>=3 && Math.max(...Object.values(tc))<=7 && totalCredits(t)<=100;
}

function canPick(p){return (exposure[p.name]||0)<4}
function updateExposure(t){t.forEach(p=>exposure[p.name]=(exposure[p.name]||0)+1)}

// 🔥 NEW AI PICK (less repetitive)
function smartPick(players,count,risk){
let pool=[...players];

// weight = selection inverse + exposure inverse
pool.forEach(p=>{
p.weight = (risk==='high' ? (100-p.sel) : p.sel) + (5 - (exposure[p.name]||0))*10;
});

pool.sort((a,b)=>b.weight-a.weight);

return shuffle(pool).filter(canPick).slice(0,count);
}

// 🔥 NEW C/VC logic (anti-repeat)
function chooseCaptain(team,risk){
let sorted=[...team];

sorted.forEach(p=>{
p.cWeight = (risk==='high' ? (100-p.sel) : p.sel) - (captainExposure[p.name]||0)*20;
});

sorted.sort((a,b)=>b.cWeight-a.cWeight);
let cap=sorted[0];
captainExposure[cap.name]=(captainExposure[cap.name]||0)+1;
return cap;
}

function chooseVC(team,cap){
let pool=team.filter(p=>p.name!==cap.name);
return pool[Math.floor(Math.random()*pool.length)] || cap;
}

function tag(p){
if(p.sel>70) return '<span class="badge safe">SAFE</span>';
if(p.sel<30) return '<span class="badge diff">DIFF</span>';
return '<span class="badge mid">MID</span>';
}

function generateTeams(){
let players=parsePlayers(document.getElementById('input').value);
let risk=document.getElementById('risk').value;
let out=document.getElementById('output');

out.innerHTML="";
exposure={};
captainExposure={};

if(!validate(players)) return;

for(let i=0;i<10;i++){
let tries=0,team=[];

while(tries<100){
let wk=smartPick(getByRole(players,'WK'),1,risk);
let bat=smartPick(getByRole(players,'BAT'),4,risk);
let ar=smartPick(getByRole(players,'AR'),2,risk);
let bowl=smartPick(getByRole(players,'BOWL'),4,risk);

team=[...wk,...bat,...ar,...bowl];
team=[...new Map(team.map(p=>[p.name,p])).values()];

let remaining=shuffle(players).filter(p=>!team.find(x=>x.name===p.name));
while(team.length<11 && remaining.length){team.push(remaining.pop());}

if(isValid(team)) break;
tries++;
}

if(team.length!==11) continue;

let captain=chooseCaptain(team,risk);
let vc=chooseVC(team,captain);

updateExposure(team);

let div=document.createElement('div');
div.className='card';

div.innerHTML=`<h3>GL Team ${i+1}</h3>`+
team.map(p=>`<div>${p.name} (${p.role}) ${tag(p)}</div>`).join('')+
`<p><b>C:</b> ${captain.name}</p>`+
`<p><b>VC:</b> ${vc.name}</p>`+
`<p>Total Credit: ${totalCredits(team).toFixed(1)}</p>`;

out.appendChild(div);
}
}

</script>

</body>
</html>
