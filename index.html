<!DOCTYPE html>
<html>
<head>
<title>Dream11 GL AI Ultimate PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{background:#020617;color:#fff;font-family:Arial;padding:10px;}
.container{max-width:1000px;margin:auto;}
h2{text-align:center;color:#22c55e;}

.card{
background:#1e293b;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

textarea{
width:100%;height:60px;margin:5px 0;
border-radius:8px;border:none;padding:8px;background:#020617;color:white;
}

select,input{
width:100%;padding:8px;margin:5px 0;border-radius:8px;border:none;background:#020617;color:white;
}

button{
width:100%;padding:12px;background:#22c55e;border:none;border-radius:10px;font-size:16px;
}

.team{background:#020617;padding:10px;margin-top:10px;border-radius:10px;}
.c{color:gold;font-weight:bold;}
.vc{color:#38bdf8;font-weight:bold;}
</style>

</head>

<body>

<div class="container">

<h2>🏏 Dream11 GL AI Ultimate PRO</h2>

<div class="card">
<b>TEAM A</b>
WK<textarea id="a_wk"></textarea>
BAT<textarea id="a_bat"></textarea>
AR<textarea id="a_ar"></textarea>
BOWL<textarea id="a_bowl"></textarea>
</div>

<div class="card">
<b>TEAM B</b>
WK<textarea id="b_wk"></textarea>
BAT<textarea id="b_bat"></textarea>
AR<textarea id="b_ar"></textarea>
BOWL<textarea id="b_bowl"></textarea>
</div>

<div class="card">
<label>Pitch Type</label>
<select id="pitch">
<option value="bat">Batting</option>
<option value="bowl">Bowling</option>
<option value="spin">Spin</option>
<option value="balanced">Balanced</option>
</select>

<label>Toss Winner</label>
<select id="toss">
<option value="A">Team A</option>
<option value="B">Team B</option>
</select>

<label>Decision</label>
<select id="decision">
<option value="bat">Batting</option>
<option value="bowl">Bowling</option>
</select>

<label>No. of Teams</label>
<input type="number" id="teams" value="5" min="1" max="20">
</div>

<button onclick="generate()">🚀 Generate GL Teams</button>

<div id="out"></div>

</div>

<script>

let usedCombos = new Set();
let usedTeams = new Set();

// PARSE
function parse(text, team, role){
return text.split(",")
.map(x=>x.trim())
.filter(x=>x)
.map(x=>({
name:x,
team:team,
role:role,
sel:Math.random(),
used:0
}));
}

// ROLE FILTER
function roleFilter(pool,role){
return pool.filter(p=>p.role===role);
}

// SMART PICK (LOW USED FIRST)
function pickSmart(list,count,used){
let sorted=[...list].sort((a,b)=>a.used-b.used);
let res=[];

for(let p of sorted){
if(res.length===count) break;
if(!used.has(p.name)){
used.add(p.name);
p.used++;
res.push(p);
}
}
return res;
}

// VALIDATE DREAM11 RULES
function validate(team){
let countA = team.filter(p=>p.team==="A").length;
let countB = team.filter(p=>p.team==="B").length;

if(countA>7 || countB>7) return false;

let wk = team.filter(p=>p.role==="WK").length;
let bat = team.filter(p=>p.role==="BAT").length;
let ar = team.filter(p=>p.role==="AR").length;
let bowl = team.filter(p=>p.role==="BOWL").length;

if(wk<1 || bat<3 || ar<1 || bowl<3) return false;

return true;
}

// UNIQUE TEAM CHECK
function isUnique(team){
let names = team.map(p=>p.name).sort().join("-");
if(usedTeams.has(names)) return false;
usedTeams.add(names);
return true;
}

// SMART CAPTAIN
function getCaptain(team){
let sorted=[...team].sort((a,b)=>b.sel-a.sel);
return sorted[Math.floor(Math.random()*5)];
}

// SMART VICE CAPTAIN
function getVice(team,c){
let others=team.filter(p=>p.name!==c.name);
return others[Math.floor(Math.random()*5)];
}

// MAIN GENERATE
function generate(){

usedCombos.clear();
usedTeams.clear();

let A=[
...parse(a_wk.value,"A","WK"),
...parse(a_bat.value,"A","BAT"),
...parse(a_ar.value,"A","AR"),
...parse(a_bowl.value,"A","BOWL")
];

let B=[
...parse(b_wk.value,"B","WK"),
...parse(b_bat.value,"B","BAT"),
...parse(b_ar.value,"B","AR"),
...parse(b_bowl.value,"B","BOWL")
];

if(!A.length||!B.length){
alert("Enter players");
return;
}

let pitch=document.getElementById("pitch").value;
let toss=document.getElementById("toss").value;
let decision=document.getElementById("decision").value;
let total=parseInt(document.getElementById("teams").value);

let strong = decision==="bat" ? toss : (toss==="A"?"B":"A");
let weak = strong==="A"?"B":"A";

let roleCombo={
bat:{wk:1,bat:5,ar:2,bowl:3},
bowl:{wk:1,bat:3,ar:2,bowl:5},
spin:{wk:1,bat:3,ar:3,bowl:4},
balanced:{wk:1,bat:4,ar:3,bowl:3}
};

let rc=roleCombo[pitch];

let outHTML="";

for(let t=1;t<=total;t++){

let attempts=0;

while(attempts<60){

attempts++;

let used=new Set();
let team=[];

// GL SPLIT VARIATION
let splits=[[7,4],[6,5],[5,6]];
let [strongCount,weakCount]=splits[Math.floor(Math.random()*splits.length)];

let strongPool = strong==="A"?A:B;
let weakPool = weak==="A"?A:B;

// PICK PLAYERS
team.push(...pickSmart(roleFilter(strongPool,"WK"),rc.wk,used));
team.push(...pickSmart(roleFilter(strongPool,"BAT"),Math.ceil(rc.bat*0.6),used));
team.push(...pickSmart(roleFilter(strongPool,"AR"),Math.ceil(rc.ar*0.6),used));
team.push(...pickSmart(roleFilter(strongPool,"BOWL"),Math.ceil(rc.bowl*0.6),used));

team.push(...pickSmart(roleFilter(weakPool,"BAT"),rc.bat - Math.ceil(rc.bat*0.6),used));
team.push(...pickSmart(roleFilter(weakPool,"AR"),rc.ar - Math.ceil(rc.ar*0.6),used));
team.push(...pickSmart(roleFilter(weakPool,"BOWL"),rc.bowl - Math.ceil(rc.bowl*0.6),used));

// FILL REMAINING
let all=[...A,...B];
while(team.length<11){
let p=all[Math.floor(Math.random()*all.length)];
if(!used.has(p.name)){
used.add(p.name);
p.used++;
team.push(p);
}
}

// VALIDATION
if(!validate(team)) continue;
if(!isUnique(team)) continue;

// CAPTAIN / VC
let c=getCaptain(team);
let vc=getVice(team,c);

let key=c.name+"-"+vc.name;
if(usedCombos.has(key)) continue;
usedCombos.add(key);

// OUTPUT
outHTML+=`<div class="team"><b>Team ${t}</b>`;

team.forEach(p=>{
let tag="";
if(p.name===c.name) tag=` <span class="c">(C)</span>`;
else if(p.name===vc.name) tag=` <span class="vc">(VC)</span>`;

outHTML+=`<div>${p.name} [${p.team}-${p.role}] ${tag}</div>`;
});

outHTML+=`</div>`;
break;
}
}

document.getElementById("out").innerHTML=outHTML;
}

</script>

</body>
</html>
