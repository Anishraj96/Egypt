
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:transparent;}
.wrap{padding:1rem 0;font-family:var(--font-sans);}
h2{font-size:18px;font-weight:500;color:var(--color-text-primary);text-align:center;margin-bottom:1rem;}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:12px;}
label{font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:6px;}
textarea{width:100%;height:90px;font-size:13px;resize:vertical;background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:8px;color:var(--color-text-primary);}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
input[type=number]{width:100%;background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:8px;color:var(--color-text-primary);font-size:14px;}
.gen-btn{width:100%;padding:10px;background:#22c55e;color:#fff;font-weight:500;font-size:14px;border:none;border-radius:var(--border-radius-md);cursor:pointer;margin-top:4px;}
.gen-btn:hover{background:#16a34a;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0;}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px;text-align:center;}
.stat-val{font-size:20px;font-weight:500;color:var(--color-text-primary);}
.stat-lbl{font-size:11px;color:var(--color-text-secondary);margin-top:2px;}
.teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-top:12px;}
.team-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:10px;font-size:12px;}
.team-hdr{font-weight:500;font-size:13px;color:var(--color-text-primary);border-bottom:0.5px solid var(--color-border-tertiary);padding-bottom:6px;margin-bottom:6px;display:flex;justify-content:space-between;}
.player-row{display:flex;align-items:center;gap:4px;padding:3px 0;border-bottom:0.5px solid var(--color-border-tertiary);}
.player-row:last-child{border-bottom:none;}
.role-tag{font-size:10px;padding:1px 5px;border-radius:4px;font-weight:500;flex-shrink:0;}
.tag-wk{background:#fef3c7;color:#92400e;}
.tag-bat{background:#dbeafe;color:#1e40af;}
.tag-ar{background:#ede9fe;color:#5b21b6;}
.tag-bowl{background:#dcfce7;color:#166534;}
.c-badge{color:#f59e0b;font-weight:700;font-size:11px;margin-left:auto;}
.vc-badge{color:#38bdf8;font-weight:700;font-size:11px;margin-left:auto;}
.pname{color:var(--color-text-primary);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.team-badge{font-size:10px;color:var(--color-text-secondary);flex-shrink:0;}
.err{color:var(--color-text-danger);font-size:13px;text-align:center;padding:1rem;}
.warn{background:var(--color-background-warning);border:0.5px solid var(--color-border-warning);color:var(--color-text-warning);font-size:12px;padding:8px;border-radius:var(--border-radius-md);margin-top:8px;}
.hint{font-size:11px;color:var(--color-text-secondary);margin-top:4px;}
</style>
<div class="wrap">
<h2>Dream11 GL AI Pro</h2>

<div class="card">
  <div class="row">
    <div>
      <label>Team A players (comma-separated)</label>
      <textarea id="teamA" placeholder="Rohit(wk), Kohli(bat), Jadeja(ar), Bumrah(bowl)..."></textarea>
      <div class="hint">Tags: (wk) (bat) (ar) (bowl)</div>
    </div>
    <div>
      <label>Team B players (comma-separated)</label>
      <textarea id="teamB" placeholder="Warner(bat), Maxwell(ar), Starc(bowl), Inglis(wk)..."></textarea>
      <div class="hint">Tags: (wk) (bat) (ar) (bowl)</div>
    </div>
  </div>
</div>

<div class="card">
  <div class="row">
    <div>
      <label>Number of teams to generate</label>
      <input type="number" id="numTeams" value="10" min="1" max="50">
    </div>
    <div>
      <label>Max players per team from one side</label>
      <input type="number" id="maxPerSide" value="7" min="4" max="8">
    </div>
  </div>
</div>

<button class="gen-btn" onclick="generate()">Generate Teams</button>

<div id="out"></div>
</div>

<script>
function getRole(raw){
  let n=raw.toLowerCase();
  if(n.includes("(wk)")) return "WK";
  if(n.includes("(bat)")) return "BAT";
  if(n.includes("(ar)")) return "AR";
  if(n.includes("(bowl)")) return "BOWL";
  if(n.includes("wk")||n.includes("keeper")) return "WK";
  if(n.includes("bowl")) return "BOWL";
  if(n.includes("allround")||n.includes("all-round")) return "AR";
  return "BAT";
}
function cleanName(raw){
  return raw.replace(/\((wk|bat|ar|bowl)\)/gi,"").replace(/\s+/g," ").trim();
}
function parse(text,team){
  return text.split(",").map(x=>x.trim()).filter(x=>x).map(x=>({
    raw:x, name:cleanName(x), team, role:getRole(x), weight:Math.random()
  }));
}
function validate(team, maxPerSide){
  let A=team.filter(p=>p.team==="A").length;
  let B=team.filter(p=>p.team==="B").length;
  if(A>maxPerSide||B>maxPerSide) return false;
  let wk=team.filter(p=>p.role==="WK").length;
  let bat=team.filter(p=>p.role==="BAT").length;
  let ar=team.filter(p=>p.role==="AR").length;
  let bowl=team.filter(p=>p.role==="BOWL").length;
  if(wk<1||bat<3||ar<1||bowl<3) return false;
  if(wk>4||bat>6||ar>4||bowl>6) return false;
  return true;
}

// Weighted shuffle — slightly vary weights each team for diversity
function weightedShuffle(arr){
  return arr.map(p=>({...p, sort:Math.random()*0.6 + p.weight*0.4}))
            .sort((a,b)=>b.sort-a.sort);
}

// Smart C/VC: track global usage counts to avoid repetition
let cvUsage={};

function pickCVC(team){
  // Prefer AR/BAT for C, avoid most-used pair
  let eligible=team.filter(p=>p.role==="AR"||p.role==="BAT"||p.role==="WK");
  if(eligible.length<2) eligible=team;

  // Score: lower usage = better candidate
  eligible=eligible.map(p=>({...p,score:(cvUsage[p.name]||0)+Math.random()*0.5}))
                   .sort((a,b)=>a.score-b.score);

  let c=eligible[0];
  let vc=eligible[1];

  cvUsage[c.name]=(cvUsage[c.name]||0)+1.5;
  cvUsage[vc.name]=(cvUsage[vc.name]||0)+1;
  return {c:c.name, vc:vc.name};
}

function buildTeam(all, usedCombos, maxPerSide){
  for(let attempt=0;attempt<300;attempt++){
    let shuffled=weightedShuffle(all);
    let team=[];
    let usedNames=new Set();

    // Guaranteed role slots
    let roles={WK:0,BAT:0,AR:0,BOWL:0};
    let minRequirements=[
      {role:"WK",min:1},{role:"BAT",min:3},{role:"AR",min:1},{role:"BOWL",min:3}
    ];

    // Fill minimums first
    for(let req of minRequirements){
      let candidates=shuffled.filter(p=>p.role===req.role&&!usedNames.has(p.name));
      let need=req.min;
      for(let p of candidates){
        if(need===0) break;
        team.push(p);
        usedNames.add(p.name);
        roles[p.role]++;
        need--;
      }
      if(need>0){team=[];break;}
    }
    if(team.length===0) continue;

    // Fill remaining 11 spots
    for(let p of shuffled){
      if(team.length===11) break;
      if(usedNames.has(p.name)) continue;
      team.push(p);
      usedNames.add(p.name);
    }
    if(team.length<11) continue;

    if(!validate(team,maxPerSide)) continue;

    // Deduplicate teams (prevent identical squads)
    let key=[...team].map(p=>p.name).sort().join("|");
    if(usedCombos.has(key)) continue;
    usedCombos.add(key);

    return team;
  }
  return null;
}

const roleTag={
  WK:'<span class="role-tag tag-wk">WK</span>',
  BAT:'<span class="role-tag tag-bat">BAT</span>',
  AR:'<span class="role-tag tag-ar">AR</span>',
  BOWL:'<span class="role-tag tag-bowl">BOWL</span>',
};

function generate(){
  cvUsage={};
  let A=parse(document.getElementById("teamA").value,"A");
  let B=parse(document.getElementById("teamB").value,"B");
  let numTeams=parseInt(document.getElementById("numTeams").value)||10;
  let maxPerSide=parseInt(document.getElementById("maxPerSide").value)||7;

  if(A.length<5||B.length<5){
    document.getElementById("out").innerHTML='<div class="err">Please enter at least 5 players per team.</div>';
    return;
  }
  let all=[...A,...B];
  if(all.length<11){
    document.getElementById("out").innerHTML='<div class="err">Need at least 11 total players.</div>';
    return;
  }

  // Warn if pool is small (many clones likely)
  let warn=all.length<15?'<div class="warn">Small player pool — add more players for unique team variety.</div>':"";

  let usedCombos=new Set();
  let results=[];
  let failed=0;

  for(let i=0;i<numTeams;i++){
    let team=buildTeam(all,usedCombos,maxPerSide);
    if(team) results.push(team);
    else failed++;
  }

  if(!results.length){
    document.getElementById("out").innerHTML='<div class="err">Could not generate any valid teams. Check player roles and pool size.</div>';
    return;
  }

  // Stats
  let cvCount={};
  let html=`${warn}
  <div class="stats">
    <div class="stat"><div class="stat-val">${results.length}</div><div class="stat-lbl">Teams generated</div></div>
    <div class="stat"><div class="stat-val">${failed}</div><div class="stat-lbl">Failed slots</div></div>
    <div class="stat"><div class="stat-val">${A.length}</div><div class="stat-lbl">Team A players</div></div>
    <div class="stat"><div class="stat-val">${B.length}</div><div class="stat-lbl">Team B players</div></div>
  </div>
  <div class="teams-grid">`;

  results.forEach((team,idx)=>{
    let {c,vc}=pickCVC(team);
    // Sort: C first, VC second, then by role
    let order={WK:0,BAT:1,AR:2,BOWL:3};
    let sorted=[...team].sort((a,b)=>{
      if(a.name===c) return -1;
      if(b.name===c) return 1;
      if(a.name===vc) return -1;
      if(b.name===vc) return 1;
      return order[a.role]-order[b.role];
    });

    let wkC=team.filter(p=>p.team==="A").length;
    let wkD=team.filter(p=>p.team==="B").length;

    html+=`<div class="team-card">
      <div class="team-hdr"><span>Team ${idx+1}</span><span style="font-size:11px;color:var(--color-text-secondary)">A:${wkC} B:${wkD}</span></div>`;

    sorted.forEach(p=>{
      let badge="";
      if(p.name===c) badge='<span class="c-badge">C</span>';
      else if(p.name===vc) badge='<span class="vc-badge">VC</span>';
      html+=`<div class="player-row">${roleTag[p.role]}<span class="pname">${p.name}</span><span class="team-badge">${p.team}</span>${badge}</div>`;
    });
    html+=`</div>`;
  });

  html+=`</div>`;
  document.getElementById("out").innerHTML=html;
}
</script>
